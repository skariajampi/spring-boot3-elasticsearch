global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "spring-boot"
    scheme: http
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "elasticsearch"
    static_configs:
      - targets: [ "elasticsearch-exporter:9114" ]
